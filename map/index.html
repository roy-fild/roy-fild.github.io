<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>행정구역 지도 뷰어</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    :root{
      --bg:#0b0f19;
      --panel:#111827;
      --line:#233047;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#60a5fa;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
      background:linear-gradient(180deg, #060814, #0b1020);
      color:var(--text);
      height:100vh;
      overflow:hidden;
    }

    .app{ display:grid; grid-template-columns: 280px 1fr; height:100vh; }

    .sidebar{
      background:rgba(17,24,39,.9); border-right:1px solid var(--line);
      display:flex; flex-direction:column; min-width:240px; z-index: 100;
    }
    .sidebar header{ padding:16px 14px; border-bottom:1px solid var(--line); }
    .title{ font-size:15px; font-weight:700; margin:0 0 6px 0; }
    .search{ padding:12px 14px; border-bottom:1px solid var(--line); }
    .search input{
      width:100%; padding:10px; border-radius:10px; border:1px solid #263450;
      background:#0b1224; color:var(--text); outline:none;
    }

    .district-list{ padding:10px; flex:1; overflow-y:auto; }
    .district{
      padding:10px 12px; border:1px solid transparent; border-radius:12px;
      cursor:pointer; display:flex; gap:10px; align-items:center; user-select:none;
    }
    .district:hover{ background:rgba(96,165,250,.08); border-color:rgba(96,165,250,.25); }
    .district.active{ background:rgba(96,165,250,.14); border-color:rgba(96,165,250,.35); }
    .pill{
      font-size:11px; color:#c7d2fe; background:rgba(99,102,241,.18);
      border:1px solid rgba(99,102,241,.35); padding:3px 8px; border-radius:999px; margin-left:auto;
    }

    .main{ display:flex; flex-direction:column; height:100%; }
    .topbar{
      padding:12px 14px; border-bottom:1px solid var(--line);
      background:rgba(15,23,42,.85); display:flex; gap:10px; align-items:center; flex-wrap:wrap; z-index:20;
    }
    .topbar .now{ font-weight:700; margin-right:auto; }
    .btn{
      padding:9px 10px; border-radius:10px; border:1px solid #2a3a55;
      background:#0b1224; color:var(--text); cursor:pointer; user-select:none; font-size:12px;
      touch-action: manipulation;
    }
    .btn:active { background: #1e293b; }
    
    .viewer-wrap{
      flex:1; position:relative; overflow: hidden;
      background:radial-gradient(900px 500px at 40% 30%, rgba(96,165,250,.10), transparent 55%), rgba(2,6,23,.4);
    }
    .viewer{ position:absolute; inset:14px; border:1px solid var(--line); border-radius:16px; overflow:hidden; }
    .stage{ position:absolute; left:0; top:0; width:100%; height:100%; overflow:hidden; cursor:grab; touch-action: none; }
    #mapImg{ position:absolute; left:0; top:0; transform-origin: 0 0; will-change: transform; user-select:none; max-width:none; }

    .empty{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:var(--muted); }
    .status{ position:absolute; right:26px; bottom:26px; background:rgba(15,23,42,.85); border-radius:12px; padding:10px; font-size:12px; z-index: 30; }

    .menu-btn{ display:none; padding:9px 10px; border-radius:10px; border:1px solid #2a3a55; background:#0b1224; color:var(--text); cursor:pointer; }
    .backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.45); backdrop-filter: blur(2px); display:none; z-index:140; }

    @media (max-width: 900px){
      .app{ grid-template-columns: 1fr; }
      .sidebar{ position:fixed; left:0; top:0; height:100dvh; width:280px; transform: translateX(-110%); transition: transform .2s; z-index:150; }
      .sidebar.open{ transform: translateX(0); }
      .backdrop.show{ display:block; }
      .menu-btn{ display:inline-flex; }
      .viewer{ inset:0; border-radius:0; border:none; }
      .status{ display:none; }
    }
  </style>
</head>

<body>
  <div id="backdrop" class="backdrop"></div>
  <div class="app">
    <aside class="sidebar">
      <header><p class="title">행정구역 지도</p></header>
      <div class="search"><input id="q" type="text" placeholder="검색..." /></div>
      <div id="districtList" class="district-list"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="menu-btn" id="menuBtn">☰ 메뉴</button>
        <div class="now">선택: <span id="nowName" style="color:var(--accent)">-</span></div>
        <button class="btn" id="zoomOut">축소</button>
        <button class="btn" id="zoomIn">확대</button>
        <button class="btn" id="reset">리셋</button>
      </div>

      <div class="viewer-wrap">
        <div class="viewer">
          <div id="stage" class="stage">
            <img id="mapImg" alt="map" style="display:none;" />
            <div id="empty" class="empty"><b>행정구역을 선택해 주세요.</b></div>
          </div>
        </div>
        <div class="status">배율 <span id="scaleText">1.00</span></div>
      </div>
    </main>
  </div>

<script>
$(function(){
  // 데이터 목록 (보안을 위해 https 권장)
  const districts = {
    "송파구":"https://roy-fild.github.io/map/contents/songpa-gu.png",
    "성동구":"https://roy-fild.github.io/map/contents/seongdong-gu.png",
    "양천구":"https://roy-fild.github.io/map/contents/yangcheon-gu.png",
    "분당구":"https://roy-fild.github.io/map/contents/bundang-gu.png",
    "종로구":"https://roy-fild.github.io/map/contents/jongno-gu.png",
    "중구":"https://roy-fild.github.io/map/contents/jung-gu.png",
    "동작구":"https://roy-fild.github.io/map/contents/dongjak-gu.png",
    "관악구":"https://roy-fild.github.io/map/contents/gwanak-gu.png",
    "동대문구":"https://roy-fild.github.io/map/contents/dongdaemun-gu.png",
    "은평구": "https://roy-fild.github.io/map/contents/eunpyeong-gu.png",
    "서대문구": "https://roy-fild.github.io/map/contents/seodaemun-gu.png",
    "구로구": "https://roy-fild.github.io/map/contents/guro-gu.png",
    "중랑구": "https://roy-fild.github.io/map/contents/jungnang-gu.png",
    "수지구": "https://roy-fild.github.io/map/contents/suji-gu.png",
    "수원시-영통구": "https://roy-fild.github.io/map/contents/suwon-si-yeongtong-gu.png",
    "안양시-동안구": "https://roy-fild.github.io/map/contents/anyang-si-dongan-gu.png",
    "화성시-동탄": "https://roy-fild.github.io/map/contents/dongtan.png",
    "부천시": "https://roy-fild.github.io/map/contents/bu-cheon.png",
    "구리시": "https://roy-fild.github.io/map/contents/guri-si.png",
    "군포시": "https://roy-fild.github.io/map/contents/gunpo-si.png",
    "인천시-부평구":"https://roy-fild.github.io/map/contents/bupyeong-gu.png",
    "부산-진구": "https://roy-fild.github.io/map/contents/busanjin-gu.png",
    "대전-서구": "https://roy-fild.github.io/map/contents/daejeon-seo-gu.png",
    "대구-수성구": "https://roy-fild.github.io/map/contents/daegu-suseong-gu.png",
    "광주-북구": "https://roy-fild.github.io/map/contents/gwangju-buk-gu.png",
    "포항-북구": "https://roy-fild.github.io/map/contents/pohang-si-buk-gu.png"
  };

  const $stage = $("#stage"), $img = $("#mapImg"), $empty = $("#empty");
  let state = { scale: 1, x: 0, y: 0, dragging: false, lastX: 0, lastY: 0 };
  let zoomTimer = null;

  function applyTransform(){
    $img.css("transform", `translate(${state.x}px, ${state.y}px) scale(${state.scale})`);
    $("#scaleText").text(state.scale.toFixed(2));
  }

  // 핵심 확대/축소 로직 (좌표 중심 기준)
  function zoom(delta, centerX, centerY) {
    const sw = $stage.width(), sh = $stage.height();
    // 좌표 값이 없으면 화면 중앙 기준으로 설정
    if (centerX === undefined) centerX = sw / 2;
    if (centerY === undefined) centerY = sh / 2;

    const oldScale = state.scale;
    state.scale = Math.max(0.1, Math.min(10, state.scale * delta));
    
    // 확대/축소 시 마우스(혹은 중앙) 지점이 유지되도록 좌표 보정
    const wx = (centerX - state.x) / oldScale;
    const wy = (centerY - state.y) / oldScale;
    state.x = centerX - wx * state.scale;
    state.y = centerY - wy * state.scale;
    
    applyTransform();
  }

  // 1. 마우스 휠 이벤트 추가
  $stage.on("wheel", function(e) {
    e.preventDefault();
    const rect = $stage[0].getBoundingClientRect();
    const mouseX = e.originalEvent.clientX - rect.left;
    const mouseY = e.originalEvent.clientY - rect.top;
    
    const delta = e.originalEvent.deltaY < 0 ? 1.1 : 0.9;
    zoom(delta, mouseX, mouseY);
  });

  // 2. 버튼 꾹 누르기 기능
  function startContinuousZoom(delta) {
    if (zoomTimer) return;
    zoom(delta); 
    zoomTimer = setInterval(() => zoom(delta), 50);
  }
  function stopContinuousZoom() {
    clearInterval(zoomTimer);
    zoomTimer = null;
  }

  $("#zoomIn").on("mousedown touchstart", (e) => { e.preventDefault(); startContinuousZoom(1.05); });
  $("#zoomOut").on("mousedown touchstart", (e) => { e.preventDefault(); startContinuousZoom(0.95); });
  $(window).on("mouseup mouseleave touchend touchcancel", stopContinuousZoom);

  // 3. 리셋 버튼 (화면 크기에 맞춤)
  $("#reset").on("click", () => {
    if (!$img[0].naturalWidth) return;
    const sw = $stage.width(), sh = $stage.height();
    const scaleFit = Math.min(sw / $img[0].naturalWidth, sh / $img[0].naturalHeight);
    state.scale = scaleFit || 1;
    state.x = (sw - $img[0].naturalWidth * state.scale) / 2;
    state.y = (sh - $img[0].naturalHeight * state.scale) / 2;
    applyTransform();
  });

  // 4. 드래그 이동
  $stage.on("pointerdown", function(e){
    if($img.is(":hidden")) return;
    state.dragging = true;
    state.lastX = e.clientX; state.lastY = e.clientY;
    this.setPointerCapture(e.pointerId);
  }).on("pointermove", function(e){
    if(!state.dragging) return;
    state.x += (e.clientX - state.lastX);
    state.y += (e.clientY - state.lastY);
    state.lastX = e.clientX; state.lastY = e.clientY;
    applyTransform();
  }).on("pointerup pointercancel", function(e){
    state.dragging = false;
  });

  // 5. 검색 및 리스트 초기화
  function render(filter = "") {
    const $list = $("#districtList").empty();
    Object.keys(districts).forEach(name => {
      if (name.includes(filter)) {
        $list.append(`<div class="district" data-url="${districts[name]}">${name}<div class="pill">MAP</div></div>`);
      }
    });
  }
  
  $("#q").on("input", function() { render($(this).val()); });

  $("#districtList").on("click", ".district", function(){
    const url = $(this).data("url");
    $("#nowName").text($(this).text().replace("MAP", ""));
    $(".district").removeClass("active"); $(this).addClass("active");
    $empty.hide(); $img.attr("src", url).show();
    $img.off("load").on("load", () => $("#reset").click());
    if(window.innerWidth <= 900) $(".sidebar, #backdrop").removeClass("open show");
  });

  $("#menuBtn").click(() => $(".sidebar, #backdrop").addClass("open show"));
  $("#backdrop").click(() => $(".sidebar, #backdrop").removeClass("open show"));
  
  render();
});
</script>
</body>
</html>
