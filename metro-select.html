<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>지하철 시간대별 승하차 인원 조회</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- XLSX (엑셀 다운로드용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
         :root {
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --border: #e5e7eb;
            --bg: #f3f4f6;
            --text-main: #111827;
            --text-sub: #4b5563;
            --radius-lg: 14px;
            --shadow-card: 0 10px 24px rgba(15, 23, 42, 0.12);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
            background: var(--bg);
            color: var(--text-main);
        }
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .card {
            background: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 18px 20px 22px;
        }
        
        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 700;
        }
        
        .header-meta {
            font-size: 11px;
            color: var(--text-sub);
        }
        /* 도시 탭 */
        
        .city-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .city-tab {
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 13px;
            border: 1px solid var(--border);
            background: #f3f4f6;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }
        
        .city-tab.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }
        
        .filter-card {
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #f9fafb;
            padding: 10px 12px 12px;
            margin-bottom: 12px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: 90px minmax(0, 1fr) 70px minmax(0, 1fr) 80px minmax(0, 1fr) auto;
            gap: 8px 10px;
            align-items: center;
        }
        
        .filter-label {
            font-size: 13px;
            color: var(--text-sub);
        }
        
        select,
        input[type="text"] {
            width: 100%;
            padding: 6px 8px;
            font-size: 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #ffffff;
        }
        
        .btn-search {
            border-radius: 999px;
            background: var(--primary);
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 16px;
            cursor: pointer;
            border: none;
        }
        
        .btn-excel {
            border-radius: 999px;
            background: #0ea5e9;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            border: none;
        }

        .btn-chart {
            border-radius: 999px;
            background: #111827;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            border: none;
        }

        .btn-reset {
            border-radius: 999px;
            background: #6b7280;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            border: none;
        }

        .btn-chart:hover,
        .btn-reset:hover,
        .btn-excel:hover,
        .btn-search:hover {
            opacity: 0.9;
        }
        
        .tables-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
        }
        
        .tables-wrapper {
            margin-top: 4px;
            overflow-x: auto;
        }
        
        .table-card {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 980px;
        }
        
        .table-title {
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
            background: #111827;
            color: #f9fafb;
        }
        
        .table-scroll {
            max-height: 65vh;
            overflow: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            table-layout: fixed;
        }
        
        thead tr {
            background: #e5e7eb;
        }
        
        th,
        td {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            line-height: 1.4;
        }
        /* THEAD 두 줄 sticky */
        
        thead th {
            position: sticky;
            z-index: 1;
            background: #e5e7eb;
        }
        
        thead tr:nth-child(1) th {
            top: 0;
        }
        
        thead tr:nth-child(2) th {
            top: 28px;
        }
        
        tbody tr:nth-child(even) td {
            background: #f9fafb;
        }
        
        tbody tr:hover td {
            background: #eff6ff;
        }
        
        #tblMetro th:nth-child(1) {
            width: 48px;
        }

        #tblMetro th:nth-child(2) {
            width: 90px;
        }
        
        #tblMetro th:nth-child(3) {
            width: 180px;
        }
        
        #tblMetro th:nth-child(n+4) {
            width: 90px;
        }
        
        #tblMetro th:nth-child(5),
        #tblMetro td:nth-child(5),
        #tblMetro th:nth-child(7),
        #tblMetro td:nth-child(7),
        #tblMetro th:nth-child(9),
        #tblMetro td:nth-child(9) {
            border-right: 3px solid #9ca3af;
        }

        #tblMetro tbody tr.selected-row td {
            background: #dbeafe !important;
            font-weight: 600;
        }

        .row-check {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .chart-card {
            margin-top: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #ffffff;
            overflow: hidden;
        }

        .chart-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #111827;
            color: #f9fafb;
        }

        .chart-title {
            font-size: 13px;
            font-weight: 700;
        }

        .chart-help {
            font-size: 11px;
            color: #d1d5db;
        }

        .chart-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chart-body {
            padding: 12px;
        }

        #selectedSummary {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .chart-empty {
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-sub);
            background: #f9fafb;
        }

        .chart-scroll {
            overflow-x: auto;
            width: 100%;
        }

        /* 그래프와 범례를 완전히 분리: 범례가 늘어나도 그래프 위치/크기에 영향 없음 */
        .chart-plot-layer {
            height: 360px;
            overflow: hidden;
            border-bottom: 1px solid #eef2f7;
        }

        .chart-svg {
            width: 100%;
            min-width: 100%;
            height: 360px;
            display: block;
        }

        .chart-legend-layer {
            max-height: 84px;
            overflow-y: auto;
            overflow-x: auto;
            padding-top: 10px;
        }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            font-size: 12px;
            color: var(--text-sub);
            align-items: flex-start;
        }

        /* 항목이 많아져도 글자가 찌그러지거나 압축되지 않게 고정 */
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            white-space: nowrap;
            min-width: max-content;
            line-height: 1.5;
        }

        .legend-color {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 999px;
        }


        /* FIX: 선택 항목이 늘어나도 그래프가 위로 밀리지 않도록 고정 */
        #chartArea {
            width: 100%;
        }

        #chartArea .chart-scroll {
            overflow-x: auto;
            width: 100%;
        }

        #chartArea .chart-plot-layer {
            height: 360px;
            overflow: hidden;
            border-bottom: 1px solid #eef2f7;
        }

        #chartArea .chart-svg {
            width: 100%;
            min-width: 100%;
            height: 360px;
            display: block;
        }

        #chartArea .chart-legend-layer {
            max-height: 72px;
            overflow-y: auto;
            padding-top: 10px;
        }


        /* FINAL FIX: 범례 글자 간격 고정
           - 항목이 많아져도 줄바꿈/압축하지 않음
           - 가로 스크롤로 전체 범례 확인 */
        #chartArea .chart-legend-layer {
            max-height: none !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            padding-top: 12px !important;
            padding-bottom: 8px !important;
            border-top: 1px solid #eef2f7;
        }

        #chartArea .chart-legend {
            display: inline-flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            gap: 0 !important;
            width: max-content !important;
            min-width: max-content !important;
            white-space: nowrap !important;
        }

        #chartArea .legend-item {
            display: inline-flex !important;
            align-items: center !important;
            flex: 0 0 auto !important;
            white-space: nowrap !important;
            min-width: max-content !important;
            width: max-content !important;
            margin-right: 26px !important;
            gap: 7px !important;
            font-size: 12px !important;
            letter-spacing: 0 !important;
            word-spacing: 0 !important;
            line-height: 1.6 !important;
        }

        #chartArea .legend-color {
            flex: 0 0 10px !important;
            width: 10px !important;
            height: 10px !important;
        }


        /* FINAL FIX 2: 그래프 설명란을 완전 별도 레이어처럼 분리
           - 범례가 많아도 그래프/SVG 크기와 글자 간격에 영향 없음
           - 범례는 카드 하단 고정 높이 + 가로 스크롤 */
        #chartArea .chart-legend-layer {
            position: relative !important;
            display: block !important;
            height: 64px !important;
            min-height: 64px !important;
            max-height: 64px !important;
            overflow: hidden !important;
            padding: 0 !important;
            margin-top: 10px !important;
            border-top: 1px solid #eef2f7;
            background: #ffffff;
        }

        #chartArea .chart-legend-scroll {
            position: absolute !important;
            left: 0 !important;
            right: 0 !important;
            top: 0 !important;
            bottom: 0 !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            white-space: nowrap !important;
            padding: 16px 0 10px 0 !important;
        }

        #chartArea .chart-legend {
            display: inline-flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            gap: 0 !important;
            width: max-content !important;
            min-width: max-content !important;
            white-space: nowrap !important;
        }

        #chartArea .legend-item {
            display: inline-flex !important;
            align-items: center !important;
            flex: 0 0 auto !important;
            white-space: nowrap !important;
            min-width: max-content !important;
            width: max-content !important;
            margin-right: 32px !important;
            gap: 7px !important;
            font-size: 12px !important;
            letter-spacing: normal !important;
            word-spacing: normal !important;
            line-height: 1.6 !important;
        }

        #chartArea .legend-color {
            flex: 0 0 10px !important;
            width: 10px !important;
            height: 10px !important;
        }


        /* FINAL FIX 3: X축 라벨(출근승차/퇴근하차 등) 글자 찌그러짐 방지
           원인: SVG를 width:100% + preserveAspectRatio:none 으로 강제 압축하면서
                 SVG 내부 text까지 같이 가로로 눌렸음.
           해결: SVG는 계산된 px 폭 그대로 유지하고, 부족하면 가로 스크롤 */
        #chartArea .chart-scroll {
            overflow-x: auto !important;
            overflow-y: hidden !important;
            width: 100% !important;
        }

        #chartArea .chart-svg {
            width: auto !important;
            min-width: 0 !important;
            max-width: none !important;
            height: 360px !important;
            display: block !important;
            flex: 0 0 auto !important;
        }

        #chartArea .chart-plot-layer {
            height: 360px !important;
            overflow: visible !important;
            min-width: max-content !important;
        }


        /* FINAL FIX 4: 한 화면 고정형 그래프
           - SVG 내부 X축 텍스트를 제거하고, HTML 라벨 레이어로 분리
           - 그래프 폭은 화면에 맞춰 줄어들지만, 출근승차/퇴근하차 라벨 글자는 압축되지 않음
           - 가로 스크롤 없이 한 화면에 표시 */
        #chartArea .chart-scroll {
            overflow-x: hidden !important;
            overflow-y: hidden !important;
            width: 100% !important;
        }

        #chartArea .chart-plot-layer {
            height: 318px !important;
            overflow: hidden !important;
            min-width: 0 !important;
        }

        #chartArea .chart-svg {
            width: 100% !important;
            min-width: 0 !important;
            max-width: 100% !important;
            height: 318px !important;
            display: block !important;
        }

        #chartArea .chart-x-labels {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            padding-left: 72px;
            padding-right: 28px;
            margin-top: 4px;
            margin-bottom: 10px;
            column-gap: 4px;
        }

        #chartArea .x-label-item {
            text-align: center;
            font-size: 12px;
            line-height: 1.35;
            color: #111827;
            white-space: normal;
            word-break: keep-all;
            min-width: 0;
        }

        #chartArea .x-label-item .time {
            display: block;
            margin-top: 2px;
            color: #4b5563;
            font-size: 11px;
        }

        #chartArea .chart-legend-layer {
            height: auto !important;
            min-height: 0 !important;
            max-height: 92px !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            margin-top: 8px !important;
            padding-top: 10px !important;
        }

        #chartArea .chart-legend-scroll {
            position: static !important;
            overflow: visible !important;
            padding: 0 !important;
        }

        #chartArea .chart-legend {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 8px 18px !important;
            width: auto !important;
            min-width: 0 !important;
            white-space: normal !important;
        }

        #chartArea .legend-item {
            margin-right: 0 !important;
            white-space: nowrap !important;
            flex: 0 0 auto !important;
        }

        #loading {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 4px;
        }
        /* =========================
            반응형 최적화
        ========================= */
        
        @media (max-width: 1024px) {
            .app {
                max-width: 100%;
                padding: 8px;
            }
            table {
                font-size: 11px;
            }
            th,
            td {
                padding: 5px 6px;
            }
            thead tr:nth-child(2) th {
                top: 26px;
            }
            .table-card {
                min-width: 560px;
            }
        }
        
        @media (max-width: 768px) {
            .table-card {
                min-width: 900px;
            }
            .filter-grid {
                grid-template-columns: 90px 1fr;
            }
            .btn-search {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .header-row {
                flex-direction: column;
                gap: 4px;
            }
            table {
                font-size: 10px;
            }
            th,
            td {
                padding: 4px 5px;
            }
            #tblMetro th:nth-child(1) {
                width: 44px;
            }
            #tblMetro th:nth-child(2) {
                width: 70px;
            }
            #tblMetro th:nth-child(3) {
                width: 120px;
            }
        }
    </style>

    <script>
        // 도시별 상태 관리
        const cityState = {
            seoul: {
                name: '서울',
                csvPath: 'https://roy-fild.github.io/file/metro_sudo.csv',
                data: [],
                lastResult: [],
                loaded: false,
                monthField: null,
                lineField: null,
                stationField: null,
                timeFields: {
                    board_07_08: null,
                    board_08_09: null,
                    alight_18_19: null,
                    alight_19_20: null,
                    alight_07_08: null,
                    alight_08_09: null,
                    board_18_19: null,
                    board_19_20: null,
                }
            },
            busan: {
                name: '부산',
                csvPath: 'https://roy-fild.github.io/file/metro_busan.csv',
                data: [],
                lastResult: [],
                loaded: false,
                monthField: null,
                lineField: null,
                stationField: null,
                timeFields: {
                    board_07_08: 'board_07_08',
                    board_08_09: 'board_08_09',
                    alight_18_19: 'alight_18_19',
                    alight_19_20: 'alight_19_20',
                    alight_07_08: 'alight_07_08',
                    alight_08_09: 'alight_08_09',
                    board_18_19: 'board_18_19',
                    board_19_20: 'board_19_20',
                }
            },
            daejeon: {
                name: '대전',
                csvPath: 'https://roy-fild.github.io/file/metro_daejeon.csv',
                data: [],
                lastResult: [],
                loaded: false,
                monthField: null,
                lineField: null,
                stationField: null,
                timeFields: {
                    board_07_08: 'board_07_08',
                    board_08_09: 'board_08_09',
                    alight_18_19: 'alight_18_19',
                    alight_19_20: 'alight_19_20',
                    alight_07_08: 'alight_07_08',
                    alight_08_09: 'alight_08_09',
                    board_18_19: 'board_18_19',
                    board_19_20: 'board_19_20',
                }
            },
            daegu: {
                name: '대구',
                // 파일 이름은 네가 실제 올린 이름에 맞게 변경해줘 (예: metro_daegu.csv vs metro-daegu.csv)
                csvPath: 'https://roy-fild.github.io/file/metro_daegu.csv',
                data: [],
                lastResult: [],
                loaded: false,
                monthField: null,
                lineField: null,
                stationField: null,
                timeFields: {
                    board_07_08: 'board_07_08',
                    board_08_09: 'board_08_09',
                    alight_18_19: 'alight_18_19',
                    alight_19_20: 'alight_19_20',
                    alight_07_08: 'alight_07_08',
                    alight_08_09: 'alight_08_09',
                    board_18_19: 'board_18_19',
                    board_19_20: 'board_19_20',
                }
            }
        };

        let activeCity = 'seoul'; // 기본: 서울
        let selectedChartRows = [];

        $(function() {
            // 초기: 서울 데이터 로딩
            loadCityData('seoul');

            // 조회 버튼
            $('#btnSearch').on('click', function() {
                applyFilterAndRender(activeCity);
            });

            $('#btnAddCheckedChart').on('click', function() {
                addCheckedRowsToChart();
            });

            $('#btnAddFilteredChart').on('click', function() {
                addFilteredRowsToChart();
            });

            $('#btnResetChart').on('click', function() {
                resetChart();
            });

            $('#tblMetro tbody').on('change', '.row-check', function() {
                $(this).closest('tr').toggleClass('selected-row', this.checked);
            });

            $('#tblMetro tbody').on('dblclick', 'tr', function(e) {
                if ($(e.target).is('input')) return;
                const idx = Number($(this).data('idx'));
                if (!Number.isNaN(idx)) {
                    addRowToChart(cityState[activeCity].lastResult[idx]);
                }
            });

            // 사용월 변경 시 호선 재구성
            $('#selMonth').on('change', function() {
                rebuildLineSelect(activeCity);
            });

            // 탭 클릭 이벤트
            $('.city-tab').on('click', function() {
                const city = $(this).data('city');
                if (city === activeCity) return;

                activeCity = city;

                $('.city-tab').removeClass('active');
                $(this).addClass('active');

                resetFilterUI();
                clearTables();

                if (!cityState[city].loaded) {
                    loadCityData(city);
                } else {
                    buildInitialSelects(city);
                    if (cityState[city].lastResult.length) {
                        renderTables(cityState[city].lastResult, city);
                    }
                }
            });
        });

        function findHeader(headers, keywords) {
            return headers.find(h => keywords.every(k => h.includes(k))) || null;
        }

        // 도시별 데이터 로딩
        function loadCityData(city) {
            const state = cityState[city];
            $('#loading').text(state.name + ' 데이터 불러오는 중...');

            fetch(state.csvPath)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    if (city === 'seoul') {
                        // ===== 서울: CSV (UTF-8 / EUC-KR 자동 감지) =====
                        // - 최근 CSV가 UTF-8(BOM 포함)로 바뀌면 euc-kr로 디코딩 시 한글이 깨지고,
                        //   헤더 매칭이 실패해서 표가 비어 보일 수 있어요.
                        // - 우선 UTF-8로 디코딩해보고, 정상 헤더("사용월")가 안 보이면 EUC-KR로 재시도합니다.
                        let textUtf8 = new TextDecoder('utf-8').decode(buffer);
                        const text =
                            (textUtf8.includes('사용월') || textUtf8.includes('호선명') || textUtf8.includes('지하철역'))
                            ? textUtf8.replace(/^\uFEFF/, '')   // BOM 제거
                            : new TextDecoder('euc-kr').decode(buffer);

                        parseSeoulCsv(text);
                    } else {
                        // ===== 비서울(부산/대전/대구): CSV/XLSX 모두 XLSX 라이브러리로 처리 =====
                        const bytes = new Uint8Array(buffer);

                        // HTML 방어: GitHub 안내 페이지가 내려오는 경우
                        const firstChars = String.fromCharCode(
                            bytes[0] || 0,
                            bytes[1] || 0,
                            bytes[2] || 0,
                            bytes[3] || 0,
                            bytes[4] || 0,
                            bytes[5] || 0,
                        ).toLowerCase();

                        if (firstChars.startsWith('<!doct') || firstChars.startsWith('<html')) {
                            $('#loading').text('');
                            alert(state.name + ' 데이터 경로에서 CSV/엑셀 대신 HTML 페이지가 내려오고 있어요.\nGitHub에서 "raw" 주소를 넣어주세요.');
                            return;
                        }

                        // CSV든 XLSX든 workbook으로 읽어서 첫 시트만 사용
                        const wb = XLSX.read(buffer, {
                            type: 'array'
                        });
                        const sheet = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(sheet, {
                            defval: ""
                        });
                        parseNonSeoulRows(rows, city);
                    }

                    state.loaded = true;
                    $('#loading').text('');
                    buildInitialSelects(city);
                })
                .catch(err => {
                    console.error(err);
                    $('#loading').text(state.name + ' 데이터 로딩 실패');
                });
        }

        // ---------------- 서울 파서 (기존 로직) ----------------
        function parseSeoulCsv(csvText) {
            const state = cityState.seoul;

            const lines = csvText.trim().split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim());

            state.monthField = headers[0]; // "사용월"
            state.lineField = findHeader(headers, ['호선']) || headers[1];
            state.stationField = findHeader(headers, ['역']) || headers[2];

            state.timeFields.board_07_08 = findHeader(headers, ['07', '승차']);
            state.timeFields.board_08_09 = findHeader(headers, ['08', '승차']);
            state.timeFields.alight_18_19 = findHeader(headers, ['18', '하차']);
            state.timeFields.alight_19_20 = findHeader(headers, ['19', '하차']);

            state.timeFields.alight_07_08 = findHeader(headers, ['07', '하차']);
            state.timeFields.alight_08_09 = findHeader(headers, ['08', '하차']);
            state.timeFields.board_18_19 = findHeader(headers, ['18', '승차']);
            state.timeFields.board_19_20 = findHeader(headers, ['19', '승차']);

            state.data = lines.slice(1).map(line => {
                const cols = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = cols[i]);
                return obj;
            });
        }

        // ---------------- 비서울(부산/대전/대구) 파서 ----------------
        function parseNonSeoulRows(rows, city) {
            const state = cityState[city];

            if (!rows || !rows.length) {
                state.data = [];
                return;
            }

            const first = rows[0];
            const keys = Object.keys(first);

            // 날짜 컬럼: "년월일", "사용월", "년월" 등 포함된 키 찾기
            const COL_DATE =
                keys.find(k => k.includes('년월일') || k.includes('사용월') || k.includes('년월')) || keys[2];

            const COL_STATION = keys.find(k => k.includes('역명')) || '역명';
            const COL_TYPE = keys.find(k => k.includes('구분')) || '구분';

            // 부산 / 대구는 A열(또는 '호선명'/'노선명' 등)로 호선 사용
            let COL_LINE = null;
            if (city === 'busan' || city === 'daegu') {
                COL_LINE =
                    keys.find(k =>
                        k.includes('호선') ||
                        k.includes('노선') ||
                        k.includes('라인') ||
                        k.includes('호')
                    ) || keys[0]; // 없으면 첫 번째 컬럼(A열)
            } else if (city === 'daejeon') {
                COL_LINE = null; // 대전은 호선 개념 없음
            }

            const COL_B07 = keys.find(k => k.includes('07') && k.includes('시')) || '07시-08시';
            const COL_B08 = keys.find(k => k.includes('08') && k.includes('시')) || '08시-09시';
            const COL_B18 = keys.find(k => k.includes('18') && k.includes('시')) || '18시-19시';
            const COL_B19 = keys.find(k => k.includes('19') && k.includes('시')) || '19시-20시';

            const map = {};

            rows.forEach(r => {
                const rawDate = r[COL_DATE];

                // C열 값(년월일/사용월)을 그대로 문자열로 사용
                let date;
                if (rawDate === null || rawDate === undefined) {
                    date = "";
                } else {
                    date = String(rawDate).trim();
                }

                const station = r[COL_STATION];
                const type = r[COL_TYPE];

                // ★ 부산/대구: 실제 CSV의 호선/노선(A열) 값을 사용
                let lineValue;
                if ((city === 'busan' || city === 'daegu') && COL_LINE) {
                    let rawLineVal = (r[COL_LINE] !== undefined && r[COL_LINE] !== null) ? r[COL_LINE] : '';
                    lineValue = String(rawLineVal).trim() || state.name;
                } else if (city === 'daejeon') {
                    lineValue = '대전도시철도';
                } else {
                    lineValue = state.name;
                }

                if (!date || !station || !type) return;

                // key에 호선명을 포함해서 그룹핑
                const key = date + '|' + lineValue + '|' + station;

                if (!map[key]) {
                    map[key] = {
                        사용월: date,
                        호선명: lineValue,
                        지하철역: station,
                        board_07_08: 0,
                        board_08_09: 0,
                        alight_18_19: 0,
                        alight_19_20: 0,
                        alight_07_08: 0,
                        alight_08_09: 0,
                        board_18_19: 0,
                        board_19_20: 0
                    };
                }

                const obj = map[key];

                const n = v => {
                    if (typeof v === 'number') return v;
                    if (!v) return 0;
                    const num = parseInt(String(v).replace(/,/g, ''), 10);
                    return isNaN(num) ? 0 : num;
                };

                if (type === '승차') {
                    obj.board_07_08 += n(r[COL_B07]);
                    obj.board_08_09 += n(r[COL_B08]);
                    obj.board_18_19 += n(r[COL_B18]);
                    obj.board_19_20 += n(r[COL_B19]);
                } else if (type === '하차') {
                    obj.alight_07_08 += n(r[COL_B07]);
                    obj.alight_08_09 += n(r[COL_B08]);
                    obj.alight_18_19 += n(r[COL_B18]);
                    obj.alight_19_20 += n(r[COL_B19]);
                }
            });

            state.data = Object.values(map);

            // 비서울용 필드 정의
            state.monthField = '사용월';
            state.lineField = '호선명';
            state.stationField = '지하철역';
        }

        // ---------------- 공통: 셀렉트/필터/렌더 ----------------
        function buildInitialSelects(city) {
            const state = cityState[city];

            const months = [...new Set(
                state.data
                .map(r => r[state.monthField])
                .filter(v => v !== null && v !== undefined && v !== '')
            )].sort();

            const lines = [...new Set(
                state.data
                .map(r => r[state.lineField])
                .filter(v => v !== null && v !== undefined && v !== '')
            )].sort();

            // 🔹 사용월 셀렉트 생성
            $('#selMonth').html(
                months.length ?
                months.map((m, i) => `<option value="${m}" ${i === 0 ? 'selected' : ''}>${m}</option>`) :
                '<option value="">사용월 없음</option>'
            );

            // 🔹 첫 번째 사용월 자동 선택 → 호선 재구성
            if (months.length > 0) {
                rebuildLineSelect(city);
            } else {
                $('#selLine').html('<option value="">전체</option>');
            }
        }

        function rebuildLineSelect(city) {
            const state = cityState[city];
            const month = $('#selMonth').val();

            const lines = [...new Set(
                state.data
                .filter(r => String(r[state.monthField]) === month)
                .map(r => r[state.lineField])
            )];

            $('#selLine').html('<option value="">전체</option>' + lines.map(l => `<option>${l}</option>`));
        }

        function dedupeRows(state, rows) {
            const seen = new Set();
            return rows.filter(r => {
                const key = [r[state.monthField], r[state.lineField], r[state.stationField]].join('|');
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function applyFilterAndRender(city) {
            const state = cityState[city];

            const month = $('#selMonth').val();
            const line = $('#selLine').val();
            const station = $('#txtStation').val();

            if (!month) {
                alert('사용월을 선택해 주세요.');
                return;
            }

            const filtered = state.data.filter(r =>
                String(r[state.monthField]) === month &&
                (!line || r[state.lineField] === line) &&
                (!station || String(r[state.stationField]).includes(station))
            );

            state.lastResult = dedupeRows(state, filtered);
            renderTables(state.lastResult, city);
        }

        function clearTables() {
            $('#tblMetro tbody').empty();
        }

        function toNumber(v) {
            if (typeof v === 'number') return v;
            if (v === null || v === undefined || v === '') return 0;
            const num = parseInt(String(v).replace(/,/g, ''), 10);
            return isNaN(num) ? 0 : num;
        }

        function getChartValues(row, state) {
            return [
                toNumber(row[state.timeFields.board_07_08]),
                toNumber(row[state.timeFields.board_08_09]),
                toNumber(row[state.timeFields.alight_18_19]),
                toNumber(row[state.timeFields.alight_19_20]),
                toNumber(row[state.timeFields.alight_07_08]),
                toNumber(row[state.timeFields.alight_08_09]),
                toNumber(row[state.timeFields.board_18_19]),
                toNumber(row[state.timeFields.board_19_20])
            ];
        }

        function getRowKey(row, state) {
            return [activeCity, row[state.monthField], row[state.lineField], row[state.stationField]].join('|');
        }

        function renderTables(rows, city) {
            const state = cityState[city];
            const tbody = $('#tblMetro tbody').empty();

            rows.forEach((r, idx) => {
                tbody.append(`<tr data-idx="${idx}" title="더블클릭하면 하단 그래프에 추가됩니다">
                    <td><input type="checkbox" class="row-check" aria-label="그래프 선택"></td>
                    <td>${r[state.lineField]}</td>
                    <td>${r[state.stationField]}</td>
                    <td>${r[state.timeFields.board_07_08] || ''}</td>
                    <td>${r[state.timeFields.board_08_09] || ''}</td>
                    <td>${r[state.timeFields.alight_18_19] || ''}</td>
                    <td>${r[state.timeFields.alight_19_20] || ''}</td>
                    <td>${r[state.timeFields.alight_07_08] || ''}</td>
                    <td>${r[state.timeFields.alight_08_09] || ''}</td>
                    <td>${r[state.timeFields.board_18_19] || ''}</td>
                    <td>${r[state.timeFields.board_19_20] || ''}</td>
                </tr>`);
            });
        }

        function addRowToChart(row) {
            if (!row) return;
            const state = cityState[activeCity];
            const key = getRowKey(row, state);
            if (selectedChartRows.some(item => item.key === key)) {
                renderChart();
                return;
            }

            selectedChartRows.push({
                key,
                city: activeCity,
                cityName: state.name,
                month: row[state.monthField],
                line: row[state.lineField],
                station: row[state.stationField],
                values: getChartValues(row, state)
            });
            renderChart();
        }

        function addCheckedRowsToChart() {
            const rows = cityState[activeCity].lastResult;
            const checked = $('#tblMetro tbody .row-check:checked');

            if (!checked.length) {
                alert('그래프로 볼 행을 체크하거나 행을 더블클릭해 주세요.');
                return;
            }

            checked.each(function() {
                const idx = Number($(this).closest('tr').data('idx'));
                addRowToChart(rows[idx]);
            });
        }

        function addFilteredRowsToChart() {
            const rows = cityState[activeCity].lastResult;
            if (!rows.length) {
                alert('먼저 조회를 실행해 주세요.');
                return;
            }

            rows.forEach(r => addRowToChart(r));
        }

        function resetChart() {
            selectedChartRows = [];
            $('#tblMetro tbody .row-check').prop('checked', false);
            $('#tblMetro tbody tr').removeClass('selected-row');
            renderChart();
        }

        function formatNum(num) {
            return Number(num || 0).toLocaleString('ko-KR');
        }

        function renderChart() {
            const labels = ['출근승차 07-08', '출근승차 08-09', '퇴근하차 18-19', '퇴근하차 19-20', '출근하차 07-08', '출근하차 08-09', '퇴근승차 18-19', '퇴근승차 19-20'];
            const colors = ['#2563eb', '#0ea5e9', '#f97316', '#fb923c', '#16a34a', '#22c55e', '#9333ea', '#a855f7', '#dc2626', '#64748b'];
            const container = $('#chartArea');
            const summary = $('#selectedSummary');

            if (!selectedChartRows.length) {
                summary.text('선택된 역 없음');
                container.html('<div class="chart-empty">표의 행을 더블클릭하거나 체크박스로 선택 후 [선택 항목 그래프 추가]를 눌러주세요.</div>');
                return;
            }

            summary.text(`선택된 역 ${selectedChartRows.length}개 · 더블클릭/체크박스/조회조건 전체 추가 가능`);

            // 한 화면 고정형: SVG는 화면 폭에 맞추고, X축 글자는 HTML 레이어로 따로 분리
            const containerWidth = Math.max(900, container.innerWidth() || 1100);
            const width = containerWidth;
            const height = 318;
            const margin = { top: 36, right: 28, bottom: 16, left: 72 };
            const plotW = width - margin.left - margin.right;
            const plotH = height - margin.top - margin.bottom;

            const rawMax = Math.max(1, ...selectedChartRows.flatMap(r => r.values));
            const maxVal = rawMax * 1.18;

            const groupW = plotW / labels.length;
            const barGap = selectedChartRows.length > 25 ? 1 : 2;
            const innerPadding = selectedChartRows.length > 25 ? 10 : 18;
            const barW = Math.max(1.5, Math.min(24, (groupW - innerPadding) / selectedChartRows.length - barGap));

            let svg = `<svg class="chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">`;

            svg += `<line x1="${margin.left}" y1="${margin.top + plotH}" x2="${margin.left + plotW}" y2="${margin.top + plotH}" stroke="#9ca3af"/>`;
            svg += `<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + plotH}" stroke="#9ca3af"/>`;

            for (let i = 0; i <= 4; i++) {
                const y = margin.top + plotH - (plotH * i / 4);
                const val = Math.round(maxVal * i / 4);
                svg += `<line x1="${margin.left}" y1="${y}" x2="${margin.left + plotW}" y2="${y}" stroke="#e5e7eb"/>`;
                svg += `<text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#4b5563">${formatNum(val)}</text>`;
            }

            labels.forEach((label, labelIdx) => {
                const groupX = margin.left + labelIdx * groupW + groupW / 2;
                const totalBarsW = selectedChartRows.length * barW + (selectedChartRows.length - 1) * barGap;
                const startX = groupX - totalBarsW / 2;

                selectedChartRows.forEach((row, rowIdx) => {
                    const val = row.values[labelIdx];
                    const barH = (val / maxVal) * plotH;
                    const x = startX + rowIdx * (barW + barGap);
                    const y = margin.top + plotH - barH;
                    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="2" fill="${colors[rowIdx % colors.length]}">`;
                    svg += `<title>${row.cityName} ${row.line} ${row.station} / ${label}: ${formatNum(val)}</title></rect>`;
                });
            });

            svg += `</svg>`;

            const xLabels = labels.map(label => {
                const parts = label.split(' ');
                return `<div class="x-label-item">${parts[0]}<span class="time">${parts[1]}</span></div>`;
            }).join('');

            const legend = selectedChartRows.map((row, idx) => `
                <span class="legend-item">
                    <span class="legend-color" style="background:${colors[idx % colors.length]}"></span>
                    ${row.cityName} · ${row.line} · ${row.station}
                </span>
            `).join('');

            container.html(`
                <div class="chart-scroll">
                    <div class="chart-plot-layer">${svg}</div>
                </div>
                <div class="chart-x-labels">${xLabels}</div>
                <div class="chart-legend-layer">
                    <div class="chart-legend-scroll">
                        <div class="chart-legend">${legend}</div>
                    </div>
                </div>
            `);
        }

        function exportToExcel() {
            const state = cityState[activeCity];

            if (!state.lastResult.length) {
                alert("조회 후 실행하세요");
                return;
            }

            const wb = XLSX.utils.book_new();
            const rows = [];

            // 1행 ─ 화면과 동일한 2줄 헤더 구조
            rows.push([
                "", "",
                "승차", "",
                "하차", "",
                "하차", "",
                "승차", ""
            ]);

            // 2행 ─ 상세 헤더
            rows.push([
                "호선명",
                "지하철역",
                "07-08",
                "08-09",
                "18-19",
                "19-20",
                "07-08",
                "08-09",
                "18-19",
                "19-20"
            ]);

            state.lastResult.forEach(r => {
                rows.push([
                    r[state.lineField],
                    r[state.stationField],
                    r[state.timeFields.board_07_08],
                    r[state.timeFields.board_08_09],
                    r[state.timeFields.alight_18_19],
                    r[state.timeFields.alight_19_20],
                    r[state.timeFields.alight_07_08],
                    r[state.timeFields.alight_08_09],
                    r[state.timeFields.board_18_19],
                    r[state.timeFields.board_19_20]
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);

            ws['!merges'] = [{
                s: {
                    r: 0,
                    c: 2
                },
                e: {
                    r: 0,
                    c: 3
                }
            }, {
                s: {
                    r: 0,
                    c: 4
                },
                e: {
                    r: 0,
                    c: 5
                }
            }, {
                s: {
                    r: 0,
                    c: 6
                },
                e: {
                    r: 0,
                    c: 7
                }
            }, {
                s: {
                    r: 0,
                    c: 8
                },
                e: {
                    r: 0,
                    c: 9
                }
            }];

            XLSX.utils.book_append_sheet(wb, ws, "통합_출력");
            XLSX.writeFile(wb, `metro_${cityState[activeCity].name}_${$('#selMonth').val()}.xlsx`);
        }

        function resetFilterUI() {
            $('#selMonth').val('');
            $('#selLine').val('');
            $('#txtStation').val('');
        }
    </script>
</head>

<body>
    <div class="app">
        <div class="card">

            <div class="header-row">
                <div class="header-title">지하철 시간대별 승·하차 인원 조회</div>
                <div class="header-meta"><i>by 필디</i></div>
            </div>

            <!-- 도시 탭 -->
            <div class="city-tabs">
                <div class="city-tab active" data-city="seoul">서울</div>
                <div class="city-tab" data-city="busan">부산</div>
                <div class="city-tab" data-city="daejeon">대전</div>
                <div class="city-tab" data-city="daegu">대구</div>
            </div>

            <div class="filter-card">
                <div class="filter-grid">
                    <div class="filter-label">사용월*</div>
                    <div>
                        <select id="selMonth">
                            <option>로딩중</option>
                        </select>
                    </div>

                    <div class="filter-label">호선명</div>
                    <div>
                        <select id="selLine">
                            <option>전체</option>
                        </select>
                    </div>

                    <div class="filter-label">지하철역</div>
                    <div>
                        <input id="txtStation" type="text" placeholder="역 이름 일부 입력 가능">
                    </div>

                    <div>
